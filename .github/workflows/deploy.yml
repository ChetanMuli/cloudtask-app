name: CI/CD - Build & Deploy CloudTask to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (basic build validation)
        run: node -e "require('./server.js')" & sleep 2 && kill %1 || true

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP_DIR=/home/${{ secrets.EC2_USER }}/cloudtask-app

            if [ ! -d "$APP_DIR" ]; then
              git clone ${{ secrets.REPO_URL }} "$APP_DIR"
            fi

            cd "$APP_DIR"
            git pull origin main
            npm ci --production

            # Ensure .env exists on the server (created once manually, never overwritten)
            if [ ! -f .env ]; then
              echo "WARNING: .env not found on server. Create it manually before first deploy."
            fi

            # Run DB migration (idempotent - CREATE IF NOT EXISTS)
            npm run migrate || true

            # Restart the app with PM2 (installed globally on the instance)
            pm2 startOrRestart ecosystem.config.js --env production
            pm2 save

# --------------------------------------------------------------------
# Required GitHub repo secrets:
#   EC2_HOST     - Public IP or DNS of your EC2 instance
#   EC2_USER     - SSH user (e.g. ubuntu or ec2-user)
#   EC2_SSH_KEY  - Private key (PEM contents) matching the EC2 key pair
#   REPO_URL     - This repo's git clone URL (for first-time clone on server)
# --------------------------------------------------------------------
